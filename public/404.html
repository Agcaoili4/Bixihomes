<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bixi Homes | Page Not Found</title>
    <style>
      :root {
        color-scheme: light;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background: linear-gradient(150deg, #ffffff 0%, #f3f4f4 55%, #ece9e3 100%);
        color: #111111;
      }
      .card {
        width: min(92vw, 640px);
        border-radius: 18px;
        border: 1px solid rgba(144, 130, 110, 0.3);
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 24px 48px rgba(20, 34, 24, 0.15);
        padding: 28px;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        padding: 0 12px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #90826e;
        border: 1px solid rgba(144,130,110,0.3);
        background: rgba(182,184,185,0.16);
      }
      h1 {
        margin: 14px 0 10px;
        font-size: clamp(30px, 5vw, 46px);
        line-height: 1.1;
      }
      p {
        margin: 0 0 20px;
        color: rgba(0,0,0,0.72);
        line-height: 1.7;
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      a {
        text-decoration: none;
        border-radius: 12px;
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 16px;
        font-weight: 700;
      }
      .primary {
        color: #fff;
        background: linear-gradient(135deg, #90826e 0%, #256464 100%);
      }
      .secondary {
        color: #256464;
        border: 1px solid rgba(144,130,110,0.45);
        background: rgba(182,184,185,0.24);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <span class="pill">Error 404</span>
      <h1>Page Not Found</h1>
      <p>The page you requested is unavailable. Return to the homepage or go to contact to reach our team.</p>
      <div class="row">
        <a href="/" class="primary">Back To Homepage</a>
        <a href="/#contact" class="secondary">Contact Our Team</a>
      </div>
    </div>
  </body>
</html>
